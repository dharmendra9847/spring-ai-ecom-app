# ==========================================
# APPLICATION CONFIGURATION
# ==========================================
spring.application.name=AeroCartSpringEcom

# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=8080

# ==========================================
# OLLAMA CONFIGURATION
# ==========================================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=tinyllama

# ==========================================
# AI MODEL CONFIGURATION
# ==========================================
spring.ai.ollama.chat.temperature=0.7
spring.ai.ollama.timeout=60s
spring.ai.ollama.chat.top-p=0.9
spring.ai.ollama.chat.num-predict=256

# ==========================================
# OLLAMA EMBEDDING CONFIGURATION (CORRECT)
# ==========================================
# This tells Spring AI to use Ollama for generating vector embeddings
spring.ai.ollama.embedding.enabled=true

# Specify the local embedding model you want to use
spring.ai.ollama.embedding.options.model=nomic-embed-text

# Datasource Configuration
#spring.datasource.url=jdbc:postgresql://localhost:5432/AeroCartEcom
#spring.datasource.username=postgres
#spring.datasource.password=123123
#spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
# Optional: This shows the SQL Spring is running in your console
spring.jpa.show-sql=true

# Connection Pool Settings (Optional but Recommended)
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# SQL Logging (Helpful for debugging)
logging.level.org.springframework.jdbc.core=DEBUG

# Stability AI
spring.ai.stabilityai.api-key=sk-xkpuwuRB25HEKrYNgbjz8OBFzZ4HikYza1h19CV23EYJvtKF

# Optional
spring.ai.stabilityai.image.options.model=stable-image-core

# Set max file size for single file upload (e.g., 100MB)
spring.servlet.multipart.max-file-size=100MB
# Set max request size for total upload (e.g., multiple files in a single request)
spring.servlet.multipart.max-request-size=100MB

spring.sql.init.schema-locations=classpath:init/schema.sql
spring.sql.init.mode=always
